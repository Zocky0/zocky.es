<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zocky</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      height: 100vh;
      overflow: hidden;
      color: white;
      background: linear-gradient(270deg, #7a2cff, #b84dff, #5a8dff, #9b4dff);
      background-size: 600% 600%;
      animation: gradientMove 20s ease infinite;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .bubble {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.5;
      animation: float 20s infinite ease-in-out;
    }

    .bubble:nth-child(1) {
      width: 300px;
      height: 300px;
      background: #ff6ec7;
      top: 10%;
      left: 15%;
    }

    .bubble:nth-child(2) {
      width: 350px;
      height: 350px;
      background: #5ad7ff;
      bottom: 15%;
      right: 20%;
      animation-delay: -5s;
    }

    .bubble:nth-child(3) {
      width: 250px;
      height: 250px;
      background: #8bffb0;
      top: 60%;
      left: 50%;
      animation-delay: -10s;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) translateX(0); }
      50% { transform: translateY(-40px) translateX(30px); }
    }

    .container {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 65px 90px;
      border-radius: 26px;
      backdrop-filter: blur(35px);
      background: rgba(0, 0, 0, 0.35);
      max-width: 900px;
      width: 90%;
    }

    .title {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin-bottom: 20px;
    }

    .title img {
      width: 120px;
      height: 120px;
      object-fit: contain;
    }

    .title h1 {
      font-size: 4.8rem;
      font-weight: 800;
    }

    .subtitle {
      font-size: 1.15rem;
      opacity: 0.85;
      margin-bottom: 35px;
    }

    .socials {
      display: flex;
      justify-content: center;
      gap: 32px;
      margin-bottom: 35px;
    }

    .socials a {
      font-size: 2rem;
      color: white;
      opacity: 0.85;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }

    .socials a:hover {
      transform: scale(1.3);
      opacity: 1;
    }

    .info h2 {
      font-size: 1.4rem;
      margin-bottom: 20px;
      font-weight: 600;
    }

    .info-boxes {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .info-box {
      padding: 14px 22px;
      border-radius: 14px;
      background: rgba(0,0,0,0.45);
      cursor: pointer;
    }

    .blur {
      filter: blur(8px);
      transition: filter 0.3s ease;
    }

    .info-box:hover .blur {
      filter: blur(0);
    }

    .label {
      font-weight: 600;
      margin-bottom: 6px;
      opacity: 0.9;
    }

    /* MENSAJE FINAL */
    .footer-note {
      margin-top: 45px;
      font-size: 0.95rem;
      opacity: 0.6;
    }
  </style>
</head>

<body>

  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>

  <div class="container">

    <div class="title">
      <img src="./logo.png" alt="logo">
      <h1>Zocky</h1>
    </div>

    <p class="subtitle">$ zocky.load("next project")</p>

    <div class="socials">
      <a href="https://discord.com/users/1179427245048221710" target="_blank">
        <i class="fab fa-discord"></i>
      </a>
      <a href="https://x.com/Zockyy_" target="_blank">
        <i class="fab fa-x-twitter"></i>
      </a>
      <a href="https://www.twitch.tv/zockyy__" target="_blank">
        <i class="fab fa-twitch"></i>
      </a>
      <a href="https://open.spotify.com/user/31qkpymlq7frp6am3xopkn3wmbdu?si=28f516f2863b4a1c" target="_blank">
        <i class="fab fa-spotify"></i>
      </a>
    </div>

    <div class="info">
      <h2>Info</h2>

      <div class="info-boxes">
        <div class="info-box">
          <div class="label">Tu IP es:</div>
          <div id="ip" class="blur">Cargando...</div>
        </div>

        <div class="info-box">
          <div class="label">Estás en:</div>
          <div id="location" class="blur">Cargando...</div>
        </div>
      </div>
    </div>

    <!-- MENSAJITO -->
    <div class="footer-note">
      Esta web se volverá a actualizar próximamente
    </div>

  </div>

  <script>
    // API alternativa que funciona desde GitHub Pages
    fetch("https://ipwhois.app/json/")
      .then(res => res.json())
      .then(data => {
        document.getElementById("ip").textContent = data.ip;
        document.getElementById("location").textContent =
          `${data.city}, ${data.region}, ${data.country}`;
      })
      .catch(() => {
        document.getElementById("ip").textContent = "No disponible";
        document.getElementById("location").textContent = "No disponible";
      });
  </script>

</body>
</html>
